    ],
    "telehealth-video": [
      { item: "91790", label: "Level A video (<6 min)", fee: 20.05 },
      { item: "91800", label: "Level B video (6–<20 min)", fee: 43.90 },
      { item: "91801", label: "Level C video (≥20 min)", fee: 84.90 },
      { item: "91802", label: "Level D video (≥40 min)", fee: 125.10 },
      { item: "91920", label: "Level E video (≥60 min)", fee: 202.65 },
    ],
    "telehealth-phone": [
      { item: "91890", label: "Level A phone (<6 min)", fee: 20.05 },
      { item: "91891", label: "Level B phone (≥6 min)", fee: 43.90 },
    ],
  },
  specialist: {
    "in-person": [
      { item: "110", label: "Consultant physician — initial attendance", fee: 178.70 },
      { item: "116", label: "Consultant physician — subsequent attendance", fee: 89.40 },
      { item: "119", label: "Consultant physician — subsequent minor attendance", fee: 50.95 },
      { item: "132", label: "Consultant physician — complex initial (≥2 morbidities, ≥45 min, management plan)", fee: 312.45 },
      { item: "133", label: "Consultant physician — complex review (≥2 morbidities, ≥20 min)", fee: 156.45 },
    ],
    "telehealth-video": [
      { item: "91824", label: "Consultant physician — initial video attendance", fee: 178.70 },
      { item: "91825", label: "Consultant physician — subsequent video attendance", fee: 89.40 },
      { item: "92422", label: "Consultant physician — complex initial video (≥2 morbidities, ≥45 min)", fee: 312.45 },
      { item: "92423", label: "Consultant physician — complex review video (≥20 min)", fee: 156.45 },
    ],
    "telehealth-phone": [
      { item: "92440", label: "Consultant physician — subsequent phone attendance", fee: 89.40 },
    ],
  },
  psychiatrist: {
    "in-person": [
      { item: "291", label: "TMAP — assessment with 12-month management plan (>45 min, to GP/NP)", fee: 535.95 },
      { item: "293", label: "TMAP review — re-referral required (30–45 min)", fee: 335.05 },
      { item: "296", label: "Initial — new patient or >24 months gap (>45 min, consulting rooms)", fee: 308.30 },
      { item: "297", label: "Initial — new patient or >24 months gap (>45 min, hospital)", fee: 308.30 },
      { item: "300", label: "Subsequent — ≤15 min (consulting rooms, ≤50/year)", fee: 51.30 },
      { item: "302", label: "Subsequent — 15–30 min (consulting rooms, ≤50/year)", fee: 102.40 },
      { item: "304", label: "Subsequent — 30–45 min (consulting rooms, ≤50/year)", fee: 157.60 },
      { item: "306", label: "Subsequent — 45–75 min (consulting rooms, ≤50/year)", fee: 217.50 },
      { item: "308", label: "Subsequent — >75 min (consulting rooms, ≤50/year)", fee: 252.40 },
      { item: "319", label: "Psychotherapy — intensive, >45 min (≤160/year)", fee: 217.50 },
      { item: "320", label: "Subsequent hospital — ≤15 min", fee: 51.30 },
      { item: "322", label: "Subsequent hospital — 15–30 min", fee: 102.40 },
      { item: "324", label: "Subsequent hospital — 30–45 min", fee: 157.60 },
      { item: "326", label: "Subsequent hospital — 45–75 min", fee: 217.50 },
      { item: "328", label: "Subsequent hospital — >75 min", fee: 252.40 },
    ],
    "telehealth-video": [
      { item: "92435", label: "TMAP via video (>45 min, to GP/NP)", fee: 535.95 },
      { item: "92437", label: "Initial video — new patient or >24 months gap (>45 min)", fee: 308.30 },
      { item: "91827", label: "Subsequent video — ≤15 min (≤50/year)", fee: 51.30 },
      { item: "91828", label: "Subsequent video — 15–30 min (≤50/year)", fee: 102.40 },
      { item: "91829", label: "Subsequent video — 30–45 min (≤50/year)", fee: 157.60 },
      { item: "91830", label: "Subsequent video — 45–75 min (≤50/year)", fee: 217.50 },
      { item: "91831", label: "Subsequent video — >75 min (≤50/year)", fee: 252.40 },
    ],
    "telehealth-phone": [
      { item: "91837", label: "Subsequent phone — ≤15 min (≤50/year)", fee: 51.30 },
      { item: "91838", label: "Subsequent phone — 15–30 min (≤50/year)", fee: 102.40 },
      { item: "91839", label: "Subsequent phone — 30–45 min (≤50/year)", fee: 157.60 },
    ],
  },
};

function DVATab() {
  const [cardType, setCardType] = useState("");
  const [specialty, setSpecialty] = useState("");
  const [modality, setModality] = useState("");
  const [conditionCovered, setConditionCovered] = useState(null);
  const [showItems, setShowItems] = useState(false);

  const reset = () => {
    setCardType("");
    setSpecialty("");
    setModality("");
    setConditionCovered(null);
    setShowItems(false);
  };

  const items = useMemo(() => {
    if (!specialty || !modality) return [];
    return (DVA_ITEMS[specialty]?.[modality]) || [];
  }, [specialty, modality]);

  const canBill = cardType === "gold" || (cardType === "white" && conditionCovered === true);
  const whiteNeedsCoverageCheck = cardType === "white" && conditionCovered === null;

  return (
    <div>
      {/* Card type */}
      <div className="card">
        <h2 style={{marginBottom:14,fontSize:16}}>DVA Billing Decision Tree</h2>
        <p style={{fontSize:13,color:'var(--text-secondary)',marginBottom:16,lineHeight:1.6}}>
          DVA billing uses the same MBS item numbers for medical consultations, but DVA pays the provider directly at DVA schedule fees (typically higher than MBS). This tab helps you determine eligibility and select the correct item. Always verify coverage before claiming.
        </p>

        <div className="field-label" style={{marginBottom:8}}>Step 1 — DVA card type</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
          {[
            { key: "gold", label: "Gold Card", sub: "All conditions" },
            { key: "white", label: "White Card", sub: "Service-related conditions" },
            { key: "orange", label: "Orange Card", sub: "Pharmaceuticals only" },
          ].map(c => (
            <div key={c.key}
              onClick={() => { setCardType(c.key); setConditionCovered(null); setShowItems(false); }}
              style={{cursor:'pointer',padding:'10px 16px',borderRadius:8,border:`2px solid ${cardType===c.key ? 'var(--primary)' : 'var(--border)'}`,background:cardType===c.key?'var(--primary-light)':'var(--card)',minWidth:130,flex:1}}>
              <div style={{fontWeight:600,fontSize:14,color:cardType===c.key?'var(--primary)':'var(--text)'}}>{c.label}</div>
              <div style={{fontSize:12,color:'var(--text-secondary)',marginTop:2}}>{c.sub}</div>
            </div>
          ))}
        </div>

        {cardType && (
          <div className={`warn-box`} style={{background:cardType==='gold'?'var(--success-light)':cardType==='white'?'var(--warn-light)':'var(--primary-light)',borderColor:cardType==='gold'?'var(--success)':cardType==='white'?'var(--warn)':'var(--primary)',marginBottom:16}}>
            <strong>{cardType === 'gold' ? '✓ Gold Card' : cardType === 'white' ? 'White Card' : 'ℹ Orange Card'}: </strong>
            {DVA_NOTES[cardType]}
          </div>
        )}

        {/* Orange card — nothing more to do */}
        {cardType === "orange" && (
          <div style={{padding:'12px 0',color:'var(--text-secondary)',fontSize:13}}>
            Orange Card only covers pharmaceuticals. For medical consultations, bill through standard Medicare. No DVA consultation billing applies.
          </div>
        )}

        {/* White card — condition coverage check */}
        {cardType === "white" && (
          <div style={{marginBottom:16}}>
            <div className="field-label" style={{marginBottom:8}}>Is this consultation for an accepted service-related condition (or an NMHSS / non-liability condition)?</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
              {[
                { val: true, label: "Yes — condition is covered", style: {border:'2px solid var(--success)',background:'var(--success-light)'} },
                { val: false, label: "No — not a covered condition", style: {border:'2px solid var(--danger)',background:'#fef2f2'} },
                { val: null, label: "Unsure / need to check", style: {border:'2px solid var(--border)'} },
              ].map(o => (
                <div key={String(o.val)}
                  onClick={() => setConditionCovered(o.val)}
                  style={{cursor:'pointer',padding:'8px 14px',borderRadius:8,flex:1,minWidth:140,...(conditionCovered===o.val?o.style:{border:'2px solid var(--border)'})}}>
                  <div style={{fontSize:13,fontWeight:conditionCovered===o.val?600:400}}>{o.label}</div>
                </div>
              ))}
            </div>
            {conditionCovered === false && (
              <div style={{marginTop:10,padding:'10px 12px',background:'#fef2f2',border:'1px solid var(--danger)',borderRadius:6,fontSize:13,color:'#8b0000'}}>
                White Card does not cover this condition. Bill through standard Medicare MBS for this patient. If the patient may have an applicable non-liability condition (PTSD, mental health, cancer, etc.), check with DVA before declining to bill DVA.
              </div>
            )}
            {conditionCovered === null && (
              <div style={{marginTop:10,padding:'10px 12px',background:'var(--primary-light)',border:'1px solid var(--border)',borderRadius:6,fontSize:13,color:'var(--text-secondary)'}}>
                Check the patient's White Card conditions and the DVA non-liability health care conditions at dva.gov.au before proceeding.
              </div>
            )}
          </div>
        )}

        {/* Specialty selection */}
        {canBill && (
          <>
            <div className="field-label" style={{marginBottom:8}}>Step 2 — Provider type</div>
            <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
              {[
                { key: "gp", label: "General Practitioner" },
                { key: "specialist", label: "Specialist / Consultant Physician" },
                { key: "psychiatrist", label: "Consultant Psychiatrist" },
              ].map(s => (
                <div key={s.key}
                  onClick={() => { setSpecialty(s.key); setModality(""); setShowItems(false); }}
                  style={{cursor:'pointer',padding:'10px 16px',borderRadius:8,border:`2px solid ${specialty===s.key?'var(--primary)':'var(--border)'}`,background:specialty===s.key?'var(--primary-light)':'var(--card)',flex:1,minWidth:140}}>
                  <div style={{fontWeight:600,fontSize:13,color:specialty===s.key?'var(--primary)':'var(--text)'}}>{s.label}</div>
                </div>
              ))}
            </div>

            {/* Modality selection */}
            {specialty && (
              <>
                <div className="field-label" style={{marginBottom:8}}>Step 3 — Modality</div>
                <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:16}}>
                  {[
                    { key: "in-person", label: "In Person" },
                    { key: "telehealth-video", label: "Video" },
                    { key: "telehealth-phone", label: "Phone" },
                  ].map(m => (
                    <div key={m.key}
                      onClick={() => { setModality(m.key); setShowItems(true); }}
                      style={{cursor:'pointer',padding:'10px 16px',borderRadius:8,border:`2px solid ${modality===m.key?'var(--primary)':'var(--border)'}`,background:modality===m.key?'var(--primary-light)':'var(--card)',flex:1,minWidth:110}}>
                      <div style={{fontWeight:600,fontSize:13,color:modality===m.key?'var(--primary)':'var(--text)'}}>{m.label}</div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </>
        )}
      </div>

      {/* DVA Results */}
      {showItems && items.length > 0 && (
        <div className="card">
          <h2 style={{marginBottom:6,fontSize:15}}>
            Applicable DVA Item Numbers
            <span style={{fontSize:12,fontWeight:400,color:'var(--text-secondary)',marginLeft:10}}>
              {cardType === 'gold' ? 'Gold Card' : 'White Card'} · {specialty === 'gp' ? 'GP' : specialty === 'specialist' ? 'Specialist / Consultant Physician' : 'Consultant Psychiatrist'} · {modality === 'in-person' ? 'In Person' : modality === 'telehealth-video' ? 'Video' : 'Phone'}
            </span>
          </h2>
          <div style={{marginBottom:14,padding:'8px 12px',background:'var(--warn-light)',border:'1px solid #f5c842',borderRadius:6,fontSize:12,lineHeight:1.6,color:'#5f3800'}}>
            <strong>Fees shown are MBS schedule fees (Nov 2025) for reference only.</strong> DVA schedule fees are set separately and are generally higher. Verify current DVA fees at <strong>dva.gov.au</strong> before billing. DVA pays the full DVA schedule fee directly — no Medicare benefit, no patient out-of-pocket for covered services.
          </div>

          <div className="card" style={{padding:0,overflow:'hidden',marginBottom:0}}>
            {items.map((item, i) => (
              <div key={i} className="browse-item" style={{cursor:'default'}}>
                <div className="item-num" style={{color:'var(--primary)'}}>{item.item}</div>
                <div className="item-desc" style={{flex:1}}>{item.label}</div>
                <div className="item-fee" style={{color:'var(--text-secondary)',fontSize:12,whiteSpace:'nowrap'}}>
                  MBS ref: ${item.fee.toFixed(2)}
                </div>
              </div>
            ))}
          </div>
        </div>
      )}

      {showItems && items.length === 0 && modality && (
        <div className="card">
          <div style={{color:'var(--text-secondary)',fontSize:13}}>
            No DVA items found for this combination. Phone attendances for initial specialist/psychiatrist attendances are generally not available under DVA — video or in-person is required for initial consults.
          </div>
        </div>
      )}

      {/* DVA General Rules */}
      {canBill && (
        <div className="card">
          <h2 style={{fontSize:15,marginBottom:12}}>DVA Billing — Key Rules</h2>
          <div style={{fontSize:13,lineHeight:1.75,color:'var(--text)'}}>
            <div style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
              <strong>Provider registration:</strong> You must be a registered DVA provider to bill DVA. Registration is separate to Medicare provider registration. Check your registration at myepractice.dva.gov.au.
            </div>
            <div style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
              <strong>How to bill:</strong> DVA claims are submitted via ECLIPSE or Health Professional Online Services (HPOS). DVA does not use the standard Medicare claiming channel for fee-for-service claims.
            </div>
            <div style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
              <strong>Referral requirements:</strong> Same as MBS — a valid referral is required for specialist and psychiatrist attendances. Referral periods are the same (12 months for GP referrals, 3 months for specialist-to-specialist referrals, indefinite for certain conditions).
            </div>
            <div style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
              <strong>Gold Card:</strong> DVA pays 100% of the DVA schedule fee. Providers can charge above the DVA schedule fee but the patient is then liable for the gap — this is generally discouraged and some facilities have agreements to bulk-bill DVA.
            </div>
            <div style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
              <strong>Telehealth:</strong> DVA accepts telehealth claims for most consultation items. The patient must consent to the modality. The same MBS telehealth eligibility requirements generally apply.
            </div>
            <div style={{marginBottom:10,paddingBottom:10,borderBottom:'1px solid var(--border)'}}>
              <strong>After-hours / home visits:</strong> DVA pays higher fees for after-hours and home visit items. These are the same MBS after-hours item numbers (e.g. Group A6/A7) but at DVA rates.
            </div>
            <div>
              <strong>Veterans' Compensation health care:</strong> Some veterans receive health care under Compensation or SRCA/MRCA — different rules apply. Confirm with the veteran which scheme covers them.
            </div>
          </div>
        </div>
      )}

      {canBill && (
        <div style={{textAlign:'center',marginTop:4,marginBottom:16}}>
          <button className="btn" onClick={reset} style={{color:'var(--danger)',borderColor:'var(--danger)'}}>Reset</button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
